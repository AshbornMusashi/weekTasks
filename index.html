<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Week Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

 
  <div id="app">


    <section id="top-section">
      <div class="week-label" id="week-label">Week —</div>
      <div class="bar-wrapper">
        <div class="bar-track">
          <div class="bar-fill" id="bar-fill"></div>
          <div class="bar-pct"  id="bar-pct">0%</div>
        </div>
      </div>
      <div class="bar-stats">
        <span id="stat-done">0</span> of <span id="stat-total">0</span> tasks completed
      </div>
    </section>


    <section id="bottom-section">
      <div class="section-title">
        This Week's Tasks
        <small>DRAG &amp; DROP TO MOVE</small>
      </div>

      <div class="add-row">
        <input type="text" id="new-task-input" placeholder="Add a new task…" maxlength="120" autocomplete="off"/>
        <button id="add-btn">+ Add</button>
      </div>

      <div class="columns">
   
        <div class="col" id="col-todo" data-col="todo">
          <div class="col-header">
            <span class="col-dot todo-dot"></span>
            <h2>To Do</h2>
            <span class="col-count" id="count-todo">0</span>
          </div>
          <ul class="task-list" id="list-todo"></ul>
        </div>

    
        <div class="col" id="col-done" data-col="done">
          <div class="col-header">
            <span class="col-dot done-dot"></span>
            <h2>Done</h2>
            <span class="col-count" id="count-done">0</span>
          </div>
          <ul class="task-list" id="list-done"></ul>
        </div>
      </div>
    </section>

 
    <footer id="app-footer">
      <span class="footer-icon">⚠︎</span>
      <span>All tasks are permanently deleted at the start of each new week — make sure you complete everything before then.</span>
    </footer>

  </div>

  <div id="drag-ghost">
    <span class="ghost-bullet"></span>
    <span id="ghost-text"></span>
  </div>

  <script src="main.js"></script>
</body>
</html>
